<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日の私に寄り添うくまさんは？ | クマモリ</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@300;400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Zen Maru Gothic', 'Hiragino Kaku Gothic ProN', sans-serif;
  font-weight: 300;
  background: #fdf8f3;
  min-height: 100vh;
}

#quiz {
  max-width: 480px;
  margin: 0 auto;
  padding: 2rem 1.5rem 3rem;
}

/* ヘッダー */
.header {
  text-align: center;
  margin-bottom: 2rem;
}
.header-label {
  font-size: 11px;
  color: #b0948a;
  letter-spacing: 0.18em;
  margin-bottom: 0.4rem;
}
.header-title {
  font-size: 19px;
  font-weight: 300;
  color: #7a6058;
  letter-spacing: 0.15em;
  line-height: 1.6;
}

/* 画面切り替え */
.screen { display: none; }
.screen.active { display: block; }

/* イントロ */
.intro-desc {
  font-size: 14px;
  color: #a08878;
  line-height: 1.9;
  text-align: center;
  margin-bottom: 2rem;
  letter-spacing: 0.05em;
}
.start-btn {
  display: block;
  width: 100%;
  padding: 15px;
  border-radius: 999px;
  background: #f0d8d0;
  color: #7a4838;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-weight: 300;
  font-size: 15px;
  letter-spacing: 0.15em;
  border: none;
  cursor: pointer;
  -webkit-appearance: none;
  transition: opacity 0.2s;
}
.start-btn:hover { opacity: 0.85; }

/* 装飾ライン */
.deco-line {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 1.75rem;
}
.deco-line::before,
.deco-line::after {
  content: '';
  flex: 1;
  height: 1px;
  background: #e8d5cc;
}
.deco-line span {
  font-size: 10px;
  color: #c8a898;
  letter-spacing: 0.15em;
  white-space: nowrap;
}

/* プログレス */
.progress-wrap {
  display: flex;
  gap: 6px;
  margin-bottom: 1.75rem;
}
.pdot {
  flex: 1;
  height: 3px;
  border-radius: 2px;
  background: #edddd6;
  transition: background 0.3s;
}
.pdot.done { background: #e8b4a0; }
.pdot.cur  { background: #d4826a; }

/* 質問 */
.q-num {
  font-size: 11px;
  color: #c8a898;
  letter-spacing: 0.12em;
  margin-bottom: 0.5rem;
}
.q-text {
  font-size: 17px;
  font-weight: 300;
  color: #6b4f47;
  line-height: 1.7;
  margin-bottom: 1.75rem;
  letter-spacing: 0.05em;
}

/* 選択肢 */
.options { display: flex; flex-direction: column; gap: 10px; }
.opt-btn {
  display: block;
  width: 100%;
  padding: 14px 18px;
  border-radius: 14px;
  border: 1px solid #e8d5cc;
  background: #fffaf8;
  color: #6b4f47;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-weight: 300;
  font-size: 14px;
  text-align: left;
  cursor: pointer;
  line-height: 1.6;
  letter-spacing: 0.04em;
  -webkit-appearance: none;
  transition: background 0.15s, border-color 0.15s;
}
.opt-btn:active {
  background: #fdeee8;
  border-color: #d4a898;
}

/* 結果 */
.result-header {
  text-align: center;
  margin-bottom: 1.5rem;
}
.result-tag {
  display: inline-block;
  font-size: 10px;
  color: #b07060;
  background: #fdeee8;
  padding: 3px 12px;
  border-radius: 999px;
  letter-spacing: 0.12em;
  margin-bottom: 1rem;
}
.result-img {
  width: 150px;
  height: 150px;
  object-fit: cover;
  border-radius: 50%;
  display: block;
  margin: 0 auto 1.25rem;
  border: 3px solid #f5e0d8;
}
.result-name {
  font-size: 20px;
  font-weight: 300;
  color: #6b4f47;
  letter-spacing: 0.12em;
  margin-bottom: 0.3rem;
}
.result-sub {
  font-size: 12px;
  color: #b0948a;
  letter-spacing: 0.1em;
}

.result-card {
  background: #fffaf8;
  border: 1px solid #edddd6;
  border-radius: 16px;
  padding: 1.5rem;
  margin-bottom: 1.25rem;
}
.result-msg {
  font-size: 14px;
  color: #6b4f47;
  line-height: 2;
  letter-spacing: 0.05em;
}

/* minneボタン */
.minne-btn {
  display: block;
  width: 100%;
  padding: 15px;
  border-radius: 999px;
  background: #f0d8d0;
  color: #7a4838;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-weight: 300;
  font-size: 14px;
  letter-spacing: 0.15em;
  text-align: center;
  text-decoration: none;
  margin-bottom: 12px;
  transition: opacity 0.2s;
  border: none;
  cursor: pointer;
  -webkit-appearance: none;
}
.minne-btn:hover { opacity: 0.85; }

.retry-btn {
  display: block;
  width: 100%;
  padding: 13px;
  border-radius: 999px;
  border: 1px solid #e8d5cc;
  background: transparent;
  color: #b0948a;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-weight: 300;
  font-size: 13px;
  letter-spacing: 0.12em;
  cursor: pointer;
  -webkit-appearance: none;
  transition: background 0.15s;
}
.retry-btn:hover { background: #fdf5f0; }

.share-hint {
  text-align: center;
  font-size: 11px;
  color: #c8a898;
  letter-spacing: 0.08em;
  margin-bottom: 1.25rem;
  line-height: 1.7;
}
</style>
</head>

var currentQ = 0;
var scores = { short: 0, choco: 0, sakura: 0, matcha: 0, roll: 0, cup: 0, cream: 0 };

function showScreen(id) {
  var all = document.querySelectorAll('.screen');
  for (var i = 0; i < all.length; i++) all[i].classList.remove('active');
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function startQuiz() {
  showScreen('screen-q');
  renderQuestion();
}

function renderQuestion() {
  var q = questions[currentQ];
  var prog = document.getElementById('progress');
  prog.innerHTML = '';
  for (var i = 0; i < questions.length; i++) {
    var dot = document.createElement('div');
    dot.className = 'pdot' + (i < currentQ ? ' done' : i === currentQ ? ' cur' : '');
    prog.appendChild(dot);
  }
  document.getElementById('q-num').textContent = 'Q' + (currentQ + 1) + ' / ' + questions.length;
  document.getElementById('q-text').textContent = q.text;
  var opts = document.getElementById('options');
  opts.innerHTML = '';
  for (var j = 0; j < q.options.length; j++) {
    (function(option) {
      var btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.textContent = option.label;
      btn.setAttribute('onclick', 'selectOption(' + JSON.stringify(option.scores) + ')');
      opts.appendChild(btn);
    })(q.options[j]);
  }
}

function selectOption(sc) {
  var keys = Object.keys(sc);
  for (var i = 0; i < keys.length; i++) {
    scores[keys[i]] = (scores[keys[i]] || 0) + sc[keys[i]];
  }
  currentQ++;
  if (currentQ < questions.length) {
    renderQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  var keys = Object.keys(scores);
  var winner = keys[0];
  for (var i = 1; i < keys.length; i++) {
    if (scores[keys[i]] > scores[winner]) winner = keys[i];
  }
  var c = characters[winner];
  document.getElementById('result-tag').textContent = c.tag;
  document.getElementById('result-img').src = bearImages[winner] || '';
  document.getElementById('result-img').alt = c.name;
  document.getElementById('result-name').textContent = c.name;
  document.getElementById('result-sub').textContent = c.sub;
  document.getElementById('result-msg').textContent = c.msg;
  var minneBtn = document.getElementById('minne-link');
  var minneWrap = document.getElementById('minne-wrap');
  if (c.minne) {
    minneBtn.href = c.minne;
    minneBtn.style.display = 'block';
    minneWrap.style.display = 'none';
  } else {
    minneBtn.style.display = 'none';
    minneWrap.style.display = 'block';
  }
  showScreen('screen-result');
}

function shareX() {
  var winner = Object.keys(scores).reduce(function(a, b) { return scores[a] >= scores[b] ? a : b; });
  var c = characters[winner];
  var text = '「' + c.name + '」でした🐻\n' + c.sub + '\n\n#クマモリ #こんぺいとうの森\nhttps://kumamorisweetdreamybearquiz.github.io/';
  var url = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(text);
  window.open(url, '_blank');
}

function shareInstagram() {
  var overlay = document.getElementById('ig-overlay');
  overlay.style.display = 'flex';
}
function closeIg() {
  document.getElementById('ig-overlay').style.display = 'none';
}

function restartQuiz() {
  currentQ = 0;
  scores = { short: 0, choco: 0, sakura: 0, matcha: 0, roll: 0, cup: 0, cream: 0 };
  document.getElementById('ig-overlay').style.display = 'none';
  showScreen('screen-intro');
}
</script>
