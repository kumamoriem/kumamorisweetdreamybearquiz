<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>こんぺいとうの森 | クマモリ</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@300;400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Zen Maru Gothic', 'Hiragino Kaku Gothic ProN', sans-serif;
  font-weight: 300;
  background: #fdf6f0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}
header {
  width: 100%;
  text-align: center;
  padding: 1.75rem 1rem 0.75rem;
}
header p {
  font-size: 11px;
  color: #b0948a;
  letter-spacing: 0.18em;
  margin-bottom: 0.4rem;
  font-weight: 300;
}
header h1 {
  font-size: 17px;
  font-weight: 300;
  color: #7a6058;
  letter-spacing: 0.22em;
}
.map-container {
  position: relative;
  width: 100%;
  max-width: 900px;
  margin: 0 auto;
}
.map-container img {
  width: 100%;
  height: auto;
  display: block;
}
.area {
  position: absolute;
  cursor: pointer;
  border-radius: 12px;
  transition: background 0.2s ease, transform 0.15s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
}
.area:hover { background: rgba(255,255,255,0.2); transform: scale(1.04); }
.area:active { transform: scale(0.96); }
.label {
  display: inline-block;
  background: rgba(255, 252, 248, 0.85);
  color: #6b4f47;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-weight: 300;
  font-size: clamp(9px, 1.6vw, 13px);
  letter-spacing: 0.12em;
  padding: 4px 11px;
  border-radius: 20px;
  white-space: nowrap;
  box-shadow: 0 1px 8px rgba(180,140,120,0.2);
  pointer-events: none;
  transition: background 0.2s, box-shadow 0.2s;
}
.area:hover .label {
  background: rgba(255, 252, 248, 0.97);
  box-shadow: 0 2px 12px rgba(180,140,120,0.3);
}

.area-story   { left: 13%; top: 13%; width: 26%; height: 27%; align-items: flex-end; padding-bottom: 5%; }
.area-dream   { right: 8%; top: 14%; width: 20%; height: 20%; align-items: flex-end; padding-bottom: 4%; }
.area-plaza   { left: 32%; top: 65%; width: 30%; height: 12%; align-items: center; }
.area-spring  { right: 5%; bottom: 6%; width: 24%; height: 12%; align-items: center; }
.area-entrance{ left: 1%; top: 65%; width: 13%; height: 10%; align-items: center; }

.hint {
  text-align: center;
  font-size: 11px;
  color: #c0a898;
  padding: 0.75rem 1rem 1.5rem;
  letter-spacing: 0.08em;
  font-weight: 300;
}

/* ===== オーバーレイ共通 ===== */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(120, 90, 80, 0.35);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 1.5rem;
}
.overlay.show {
  display: flex;
}
.overlay-box {
  background: rgba(255, 252, 248, 0.97);
  border-radius: 20px;
  padding: 2rem 1.75rem;
  max-width: 340px;
  width: 100%;
  text-align: center;
  box-shadow: 0 8px 32px rgba(140,100,80,0.15);
  position: relative;
}
.overlay-close {
  position: absolute;
  top: 14px;
  right: 18px;
  background: none;
  border: none;
  font-size: 18px;
  color: #b0948a;
  cursor: pointer;
  line-height: 1;
}

/* ===== 森の広場ポップアップ ===== */
.plaza-title {
  font-size: 15px;
  font-weight: 300;
  color: #7a6058;
  letter-spacing: 0.15em;
  margin-bottom: 1.5rem;
}
.plaza-btn {
  display: block;
  width: 100%;
  padding: 13px 16px;
  margin-bottom: 10px;
  border-radius: 999px;
  border: 1px solid #e0cfc8;
  background: #fff;
  color: #6b4f47;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-weight: 300;
  font-size: 14px;
  letter-spacing: 0.1em;
  text-decoration: none;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
  -webkit-appearance: none;
}
.plaza-btn:last-child { margin-bottom: 0; }
.plaza-btn:hover { background: #fdf0ec; border-color: #d4b0a8; }

/* ===== 色の泉ポップアップ ===== */
.spring-label {
  font-size: 11px;
  color: #b0948a;
  letter-spacing: 0.15em;
  margin-bottom: 1rem;
}
.spring-kotoba {
  font-size: 15px;
  font-weight: 300;
  color: #5a4040;
  line-height: 1.9;
  letter-spacing: 0.08em;
  margin-bottom: 1.5rem;
  min-height: 60px;
}
.spring-refresh {
  display: inline-block;
  font-size: 12px;
  color: #b0948a;
  letter-spacing: 0.1em;
  cursor: pointer;
  border: none;
  background: none;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-weight: 300;
  padding: 6px 16px;
  border-radius: 999px;
  border: 1px solid #e0cfc8;
  transition: background 0.2s;
}
.spring-refresh:hover { background: #fdf0ec; }
</style>
</head>

<script>
var kotoba = ["今日も、ちゃんとここにいる。それだけで十分だよ。", "やさしくしてほしい人がいるなら、まず自分に。", "急がなくていい。花は、ちゃんと咲くから。", "今日できなかったことは、明日の楽しみにしておこう。", "あなたの「好き」は、だれかの灯りになっている。", "ゆっくり息を吸って。今日のあなたは、今日だけのあなた。", "頑張ったね。ちゃんと、見ていたよ。", "疲れた日は、甘いものを食べる許可を自分に出していい。", "小さな一歩も、歩いた距離に変わりない。", "今日の空は、あなただけに見えている色をしている。", "迷っていいよ。迷えるのは、ちゃんと考えている証拠。", "あなたのペースが、あなたの正解。", "ふと立ち止まった場所に、大切なものが落ちていることがある。", "「また明日」って言える今日は、かけがえない。", "やさしい気持ちは、あなたの中からしか生まれない。大切にして。", "今日のあなたに、お疲れさまを伝えたくて。", "きれいだと思ったものを、きれいだと思える心がある。", "どんな一日も、終わりにはちゃんと夜が来てくれる。", "あなたがいるだけで、誰かの世界が少し温かい。", "焦らなくていい。こんぺいとうの森は、いつでも待っているから。", "自分に向けるやさしさを、少しだけ増やしてみて。", "今日も、よく来てくれたね。", "心が重い日は、何もしなくていい日。", "好きなものに囲まれている時間は、宝物。", "あなたの「普通の一日」は、誰かにとってのかけがえない景色。", "泉のそこには、あなたへの言葉が眠っている。", "昨日より今日が少し軽ければ、それでいい。", "あなたがあなたでいることが、いちばん大切なこと。", "星が見えない夜も、星はそこにある。", "今日のあなたに、花を一輪。"];

function toggleEvent() {
  var d = document.getElementById('event-detail');
  var b = document.getElementById('btn-event');
  if (d.style.display === 'none') {
    d.style.display = 'block';
    b.style.background = '#fdf0ec';
    b.style.borderColor = '#d4b0a8';
  } else {
    d.style.display = 'none';
    b.style.background = '#fff';
    b.style.borderColor = '#e0cfc8';
  }
}
function openPlaza() {
  document.getElementById('event-detail').style.display = 'none';
  document.getElementById('btn-event').style.background = '#fff';
  document.getElementById('btn-event').style.borderColor = '#e0cfc8';
  document.getElementById('overlay-plaza').classList.add('show');
}

function openSpring() {
  refreshKotoba();
  document.getElementById('overlay-spring').classList.add('show');
}

function closeOverlay(id) {
  document.getElementById(id).classList.remove('show');
}

function refreshKotoba() {
  var idx = Math.floor(Math.random() * kotoba.length);
  document.getElementById('kotoba-text').textContent = kotoba[idx];
}

// オーバーレイ外タップで閉じる
document.querySelectorAll('.overlay').forEach(function(el) {
  el.addEventListener('click', function(e) {
    if (e.target === el) el.classList.remove('show');
  });
});
</script>
